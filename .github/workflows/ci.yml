name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dev tooling
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check formatting)
        run: npm run format:check

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # The app and its tests have zero runtime dependencies, so the test job
      # needs no install step — it runs straight on Node's built-ins.
      - name: Syntax-check all source files
        run: |
          for f in $(find src scripts sw.js -name '*.js'); do
            node --check "$f"
          done

      - name: Verify the committed bundle matches source
        run: |
          npm run build
          git diff --exit-code app.bundle.js \
            || (echo "::error::app.bundle.js is stale — run 'npm run build' and commit." && exit 1)

      - name: Run unit tests
        run: npm test
